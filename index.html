<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QR Code Generator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            text-align: center;
        }

        input {
            width: 500px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            margin-left: 10px;
            cursor: pointer;
        }

        #qrcode {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }

        .code-text {
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <h2>QR Code Generator</h2>

    <input
        type="text"
        id="qrInput"
        placeholder="Enter value"
    >

    <button onclick="generateQR()">
        Generate QR
    </button>

    <div id="qrcode"></div>

    <div
        id="codeText"
        class="code-text">
    </div>

    https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.jsscript>

    <script>

        let qrCodeInstance = null;

        function generateQR() {

            const value =
                document.getElementById("qrInput")
                .value
                .trim();

            if (!value) {
                alert("Please enter value");
                return;
            }

            document.getElementById("qrcode").innerHTML = "";

            qrCodeInstance = new QRCode(
                document.getElementById("qrcode"),
                {
                    text: value,
                    width: 300,
                    height: 300,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                }
            );

            document.getElementById("codeText").innerText = value;
        }

    </script>

</body>
</html>
