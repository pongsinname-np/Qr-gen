<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QR Code Generator V1.6</title>
<style>
body{font-family:Arial,sans-serif;max-width:980px;margin:30px auto;padding:20px;background:#f7f8fa;color:#222}.container{background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08)}h1{text-align:center}.remark-box{background:#eef6ff;border-left:5px solid #0f6cbd;padding:12px 16px;margin-bottom:20px;border-radius:6px}.input-row{display:grid;grid-template-columns:180px 1fr 90px;gap:10px;align-items:center;margin-bottom:12px}input{padding:10px;font-size:16px;border:1px solid #bbb;border-radius:6px}.digit-info{text-align:right}.button-group{text-align:center;margin-top:24px}button{padding:11px 22px;margin:5px;font-size:16px;border:none;border-radius:6px;cursor:pointer;background:#0f6cbd;color:#fff}.secondary{background:#666}#qrcode{margin-top:30px;display:flex;justify-content:center}.result-box{margin-top:24px;padding:14px;background:#f9fafb;border:1px solid #ddd;border-radius:8px;word-break:break-all}.success{color:#107c10;font-weight:bold;text-align:center}.error{color:#b00020;font-weight:bold;text-align:center}
</style>
</head>
<body>
<div class="container">
<h1>QR Code Generator</h1>
<div class="remark-box"><strong>ใช้สำหรับการทดสอบเท่านั้น</strong></div>
<div class="input-row"><label>SAP Article</label><input type="text" id="sapArticle" maxlength="11" oninput="allowOnlyDigits(this)"><div class="digit-info">11 digits</div></div>
<div class="input-row"><label>Vendor Code</label><input type="text" id="vendorCode" maxlength="5" oninput="allowOnlyDigits(this)"><div class="digit-info">5 digits</div></div>
<div class="input-row"><label>EAN13 Check Digit</label><input type="text" id="eanCheckDigit" maxlength="1" oninput="allowOnlyDigits(this)"><div class="digit-info">1 digit</div></div>
<div class="input-row"><label>Batch Original No</label><input type="text" id="batchOriginalNo" maxlength="10" oninput="allowOnlyDigits(this)"><div class="digit-info">10 digits</div></div>
<div class="input-row"><label>Selling Price</label><input type="text" id="sellingPrice" maxlength="15" oninput="allowOnlyDigits(this)"><div class="digit-info">15 digits</div></div>
<div class="input-row"><label>Serial No</label><input type="text" id="serialNo" maxlength="18" oninput="allowOnlyDigits(this)"><div class="digit-info">18 digits</div></div>
<div class="button-group"><button onclick="generateQR()">Generate QR</button><button class="secondary" onclick="clearForm()">Clear</button><button class="secondary" onclick="downloadQR()">Download PNG</button></div>
<div id="message"></div>
<div class="result-box"><div style="display:flex;justify-content:space-between;align-items:center"><strong>Final QR Value:</strong><button type="button" onclick="copyFinalValue()" style="padding:6px 12px;font-size:13px;background:#107c10">Copy</button></div><div id="finalValue">-</div></div>
<div class="result-box"><strong>Total Length:</strong><div id="totalLength">0 / 60</div></div>
<div id="qrcode"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const fieldConfig=[{id:'sapArticle',length:11},{id:'vendorCode',length:5},{id:'eanCheckDigit',length:1},{id:'batchOriginalNo',length:10},{id:'sellingPrice',length:15},{id:'serialNo',length:18}];
function allowOnlyDigits(i){i.value=i.value.replace(/[^A-Za-z0-9]/g,'')}
function padValue(v,l,id){v=v.trim();if(!v)return'0'.repeat(l);return id==='serialNo'?v.padEnd(l,'0'):v.padStart(l,'0')}
function generateQR(){let val='';fieldConfig.forEach(f=>val+=padValue(document.getElementById(f.id).value,f.length,f.id));document.getElementById('finalValue').innerText=val;document.getElementById('totalLength').innerText=val.length+' / 60';document.getElementById('qrcode').innerHTML='';new QRCode(document.getElementById('qrcode'),{text:val,width:300,height:300})}
function clearForm(){fieldConfig.forEach(f=>document.getElementById(f.id).value='');document.getElementById('finalValue').innerText='-';document.getElementById('totalLength').innerText='0 / 60';document.getElementById('qrcode').innerHTML=''}
function downloadQR(){}
async function copyFinalValue(){const value=document.getElementById('finalValue').innerText;if(!value||value==='-'){alert('No QR Value to copy');return;}await navigator.clipboard.writeText(value);document.getElementById('message').innerHTML='<div class="success">Final QR Value copied to clipboard</div>';}
</script></body></html>
