<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator V1.6</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{font-family:Arial,sans-serif;max-width:1000px;margin:auto;padding:20px}
table{width:100%;border-collapse:collapse;margin-bottom:20px}
th,td{border:1px solid #ccc;padding:8px}
input{width:100%;padding:8px;text-transform:uppercase}
button{padding:10px 20px;margin:5px}
#qrcode{margin-top:20px;display:flex;justify-content:center}
.result{margin-top:15px;padding:10px;border:1px solid #ccc;word-break:break-all}
</style>
</head>

<body>

<h1>QR Generator V1.6</h1>

<table>
<tr><th>Field</th><th>Length</th></tr>
<tr><td>SAP Article</td><td>11</td></tr>
<tr><td>Vendor Code</td><td>5</td></tr>
<tr><td>EAN13 Check Digit</td><td>1</td></tr>
<tr><td>Batch Original No</td><td>10</td></tr>
<tr><td>Selling Price</td><td>15</td></tr>
<tr><td>Serial No</td><td>18</td></tr>
</table>

<label>SAP Article</label>
<input id="sapArticle" maxlength="11" oninput="allowAlphaNumeric(this)">

<label>Vendor Code</label>
<input id="vendorCode" maxlength="5" oninput="allowOnlyDigits(this)">

<label>EAN13 Check Digit</label>
<input id="eanDigit" maxlength="1" oninput="allowOnlyDigits(this)">

<label>Batch Original No</label>
<input id="batchNo" maxlength="10" oninput="allowAlphaNumeric(this)">

<label>Selling Price</label>
<input id="sellingPrice" maxlength="15" oninput="allowOnlyDigits(this)">

<label>Serial No</label>
<input id="serialNo" maxlength="18" oninput="allowAlphaNumeric(this)">

<br><br>

<button onclick="generateQR()">Generate QR</button>
<button onclick="clearForm()">Clear</button>

<div class="result">
<b>Final QR Value</b>
<div id="finalValue">-</div>
</div>

<div class="result">
<b>Total Length</b>
<div id="totalLength">0 / 60</div>
</div>

<div id="qrcode"></div>

<script>

function allowOnlyDigits(input){
    input.value=input.value.replace(/\D/g,'');
}

function allowAlphaNumeric(input){
    input.value=input.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
}

function padLeft(value,length){
    if(value==="") return "0".repeat(length);
    return value.padStart(length,"0");
}

function padRight(value,length){
    if(value==="") return "0".repeat(length);
    return value.padEnd(length,"0");
}

function generateQR(){

    const sapArticle =
        padLeft(document.getElementById("sapArticle").value.trim().toUpperCase(),11);

    const vendorCode =
        padLeft(document.getElementById("vendorCode").value.trim(),5);

    const eanDigit =
        padLeft(document.getElementById("eanDigit").value.trim(),1);

    const batchNo =
        padLeft(document.getElementById("batchNo").value.trim().toUpperCase(),10);

    const sellingPrice =
        padLeft(document.getElementById("sellingPrice").value.trim(),15);

    const serialNo =
        padRight(document.getElementById("serialNo").value.trim().toUpperCase(),18);

    const finalValue =
        sapArticle +
        vendorCode +
        eanDigit +
        batchNo +
        sellingPrice +
        serialNo;

    document.getElementById("finalValue").innerText  document.getElementById("totalLength").innerText = finalValue.length + " / 60";

    const qrContainer = document.getElementById("qrcode");
    qrContainer.innerHTML = "";

    new QRCode(qrContainer,{
        text: finalValue,
        width: 300,
        height: 300
    });
}

function clearForm(){

    document.getElementById("sapArticle").value="";
    document.getElementById("vendorCode").value="";
    document.getElementById("eanDigit").value="";
    document.getElementById("batchNo").value="";
    document.getElementById("sellingPrice").value="";
    document.getElementById("serialNo").value="";

    document.getElementById("finalValue").innerText="-";
    document.getElementById("totalLength").innerText="0 / 60";
    document.getElementById("qrcode").innerHTML="";
}

</script>

</body>
</html>
